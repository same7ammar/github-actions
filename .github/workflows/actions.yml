name: Action workflow

on: [push]

jobs:
  run-github-actions:
    runs-on: ubuntu-latest
    steps:
      - name: List Files 
        run: |
          pwd 
          ls 
      - name: checkout
        uses: actions/checkout@v1

      - name: After checkout .
        run: |
          pwd 
          ls

      - name: Simple JS action
        id: greet
        uses: actions/hello-world-javascript-action@v1
        with:
          who-to-greet: Jonh
      - name: Log Greeting Time
        run: echo "${{steps.greet.outputs.time}}"
  